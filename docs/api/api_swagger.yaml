basePath: /api/v1
definitions:
  go-template_domain_user.User:
    properties:
      access_token:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      password_hash:
        type: string
      updated_at:
        type: string
    type: object
  go-template_internal_http.Message:
    enum:
    - success
    - fail
    - too many request
    - not found
    - conflict
    - unauthorized
    - invalid input
    - forbidden
    - service unavailable
    - Database Error
    - Internal Server Error
    type: string
    x-enum-varnames:
    - Success
    - Fail
    - TooManyReq
    - NotFound
    - Conflict
    - UnAuthorized
    - InvalidInput
    - Forbidden
    - ServiceUnavailable
    - DatabaseError
    - InternalError
  go-template_internal_http.Response:
    properties:
      code:
        type: integer
      data: {}
      error:
        type: string
      message:
        $ref: '#/definitions/go-template_internal_http.Message'
    type: object
  internal_http_chi.CreateUserRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
info:
  contact: {}
  description: Go Template HTTP API documentation.
  title: Go Template API
  version: "1.0"
paths:
  /app/user/logout:
    post:
      description: Clear the app access token cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          headers:
            Set-Cookie:
              description: go_template_access_token=; Path=/api/v1/app; Max-Age=0;
                HttpOnly; SameSite=Lax
              type: string
          schema:
            $ref: '#/definitions/go-template_internal_http.Response'
      summary: Logout user
      tags:
      - Users
  /user/create:
    post:
      consumes:
      - application/json
      description: Create a new user account and issue an app access token cookie.
      parameters:
      - description: Create user request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_http_chi.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          headers:
            Set-Cookie:
              description: go_template_access_token=...; Path=/api/v1/app; HttpOnly;
                SameSite=Lax
              type: string
          schema:
            allOf:
            - $ref: '#/definitions/go-template_internal_http.Response'
            - properties:
                data:
                  $ref: '#/definitions/go-template_domain_user.User'
              type: object
        "400":
          description: invalid input
          schema:
            $ref: '#/definitions/go-template_internal_http.Response'
        "409":
          description: user already exists
          schema:
            $ref: '#/definitions/go-template_internal_http.Response'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/go-template_internal_http.Response'
      summary: Create user
      tags:
      - Users
swagger: "2.0"
